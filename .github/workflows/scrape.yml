name: Wimbledon Debenture Scraper

on:
  schedule:
    # Twice daily at 00:00 and 12:00 UTC. Bump to hourly during the
    # tournament fortnight (29 Jun - 13 Jul 2026) when prices actually move.
    - cron: '0 */12 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write  # required so the workflow can commit/push the updated CSVs and DB

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python wimbledon_tracker.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add wimbledon_analysis.csv wimbledon_daily_snapshots.csv wimbledon_debentures.db
          git diff --staged --quiet || git commit -m "Update data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
