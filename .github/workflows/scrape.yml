name: Scrape Wimbledon Debentures

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Manual trigger button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python wimbledon_tracker.py

      - name: Commit and push updated data
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add wimbledon_debentures.db wimbledon_analysis.csv wimbledon_daily_snapshots.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update data - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
